services:
  mcp-server:
    build: ./mcp-server
    ports:
      - "8080:8080"
    environment:
      MCP_TRANSPORT: streamable-http
      PORT: 8080
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/mcp')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  agent-api:
    build: ./agent-api
    ports:
      - "8081:8080"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: gpt-4o-mini
      MCP_SERVER_URL: http://mcp-server:8080
      MCP_SERVER_NAME: program
      PORT: 8080
      LOG_LEVEL: INFO
    depends_on:
      mcp-server:
        condition: service_started
